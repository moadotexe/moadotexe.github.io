<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <title>moa.exe</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%232997ff'/><stop offset='1' stop-color='%23bf5af2'/></linearGradient></defs><rect width='100' height='100' rx='23' fill='url(%23g)'/><text x='50' y='70' font-size='56' font-weight='700' font-family='Helvetica,Arial,sans-serif' fill='white' text-anchor='middle'>m</text></svg>" />
  <meta name="description" content="Moa — data scientist in training. Applied Physics background. Health financing data analysis and policy research." />

  <style>
    /* ── Tokens ── */
    :root {
      color-scheme: dark;
      --bg:        #000000;
      --bg2:       #0a0a0c;
      --surface:   #1d1d1f;
      --surface2:  #161617;
      --border:    rgba(255,255,255,.1);
      --text:      #f5f5f7;
      --text2:     #d2d2d7;
      --muted:     #86868b;
      --accent:    #2997ff;
      --accent-btn:       #0071e3;
      --accent-btn-hover: #0077ed;
      --purple:    #bf5af2;
      --cyan:      #64d2ff;
      --green:     #30d158;
      --red:       #ff453a;
      --grad:      linear-gradient(110deg, #2997ff 0%, #bf5af2 55%, #ff375f 100%);
      --ease:      cubic-bezier(.28,.11,.32,1);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 1.0625rem;
      line-height: 1.47;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    code {
      font-family: ui-monospace, 'SF Mono', SFMono-Regular, Menlo, monospace;
      background: rgba(255,255,255,.08);
      padding: .1em .4em;
      border-radius: 6px;
      font-size: .9em;
    }
    ::selection { background: var(--accent-btn); color: #fff; }
    a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    /* ── Gradient text ── */
    .text-grad {
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    /* ── Layout ── */
    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 1.375rem;
    }

    /* ── Nav ── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: .8rem 0;
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(255,255,255,.07);
      background: rgba(22,22,23,.8);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .brand {
      font-size: 1.0625rem;
      font-weight: 600;
      letter-spacing: -.01em;
      color: var(--text);
      cursor: pointer;
    }
    .brand-dim { color: var(--muted); font-weight: 500; }

    .nav-links {
      display: flex;
      gap: .35rem;
      list-style: none;
    }
    .nav-links a {
      padding: .4rem .8rem;
      border-radius: 980px;
      font-size: .8125rem;
      letter-spacing: -.01em;
      color: rgba(245,245,247,.65);
      transition: color .25s var(--ease), background .25s var(--ease);
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active {
      color: var(--text);
      background: rgba(255,255,255,.1);
    }

    /* ── Page engine ── */
    #page {
      opacity: 1;
      transform: translateY(0);
      transition: opacity .18s var(--ease), transform .18s var(--ease);
    }
    #page.leaving {
      opacity: 0;
      transform: translateY(10px);
    }

    /* ── Shared section helpers ── */
    .pt { padding-top: 5rem; }
    .pb { padding-bottom: 5rem; }
    .spacer-sm { height: 1rem; }
    .spacer-lg { height: 5rem; }
    .section-label {
      display: inline-block;
      width: fit-content;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -.01em;
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      margin-bottom: .75rem;
    }
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.75rem 0;
    }

    /* ── HOME ── */
    .hero {
      min-height: min(720px, calc(100dvh - 60px));
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 5rem 0 3.5rem;
      position: relative;
    }
    .hero-glow {
      position: absolute;
      top: -5%;
      right: -20%;
      width: 640px;
      height: 640px;
      background:
        radial-gradient(closest-side at 60% 40%, rgba(41,151,255,.16), transparent),
        radial-gradient(closest-side at 35% 65%, rgba(191,90,242,.12), transparent);
      pointer-events: none;
      border-radius: 50%;
    }
    .hero > * { position: relative; animation: rise .6s var(--ease) both; }
    .hero > *:nth-child(3) { animation-delay: .06s; }
    .hero > *:nth-child(4) { animation-delay: .12s; }
    .hero > *:nth-child(5) { animation-delay: .18s; }
    .hero > *:nth-child(6) { animation-delay: .24s; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-eyebrow {
      font-size: 1.0625rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }
    .hero h1 {
      font-size: clamp(2.6rem, 6.5vw, 4.5rem);
      font-weight: 700;
      line-height: 1.06;
      letter-spacing: -.025em;
      margin-bottom: 1.75rem;
    }
    .hero-desc {
      max-width: 44ch;
      color: var(--muted);
      font-size: 1.3125rem;
      letter-spacing: -.014em;
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }
    .btn-row { display: flex; gap: .9rem; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      padding: .75rem 1.5rem;
      border-radius: 980px;
      font-family: inherit;
      font-size: 1.0625rem;
      letter-spacing: -.014em;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background .25s var(--ease), color .25s var(--ease), transform .25s var(--ease);
    }
    .btn:active { transform: scale(.98); }
    .btn-primary {
      background: var(--accent-btn);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-btn-hover); }
    .btn-ghost {
      background: rgba(255,255,255,.08);
      color: var(--text);
    }
    .btn-ghost:hover { background: rgba(255,255,255,.14); }

    /* stat row */
    .stats-row {
      display: flex;
      gap: 3.5rem;
      padding-top: 3.5rem;
      flex-wrap: wrap;
    }
    .stat-item { text-align: center; }
    .stat-num {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1.1;
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    .stat-label { font-size: .8125rem; color: var(--muted); margin-top: .3rem; }

    /* bento highlights */
    .bento {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 1.125rem;
    }
    @media (max-width: 700px) { .bento { grid-template-columns: 1fr; } }
    .bento-tile {
      background: linear-gradient(180deg, var(--surface), var(--surface2));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      padding: 1.875rem;
      display: flex;
      flex-direction: column;
      gap: .65rem;
    }
    .bento-label {
      display: flex;
      align-items: center;
      font-size: .8125rem;
      font-weight: 600;
      color: var(--muted);
    }
    .bento-title {
      font-size: 1.375rem;
      font-weight: 600;
      letter-spacing: -.018em;
    }
    .bento-text { color: var(--text2); font-size: .9375rem; line-height: 1.55; }
    .bento-meta { color: var(--muted); font-size: .8125rem; margin-top: auto; padding-top: .5rem; }
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      margin-right: .5rem;
      animation: pulse 2.4s var(--ease) infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(48,209,88,.45); }
      70%  { box-shadow: 0 0 0 9px rgba(48,209,88,0); }
      100% { box-shadow: 0 0 0 0 rgba(48,209,88,0); }
    }

    /* ── EXPERIENCE ── */
    .projects-header { padding: 5rem 0 2.5rem; }
    .projects-header h1 {
      font-size: clamp(2.25rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -.022em;
      margin-bottom: .75rem;
    }
    .projects-header p { color: var(--muted); font-size: 1.1875rem; letter-spacing: -.014em; max-width: 52ch; }

    .proj-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1.125rem;
      padding-bottom: 5rem;
    }
    .proj-card {
      background: linear-gradient(180deg, var(--surface), var(--surface2));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 22px;
      padding: 1.625rem;
      display: flex;
      flex-direction: column;
      gap: .8rem;
      transition: border-color .3s var(--ease), transform .3s var(--ease), box-shadow .3s var(--ease);
    }
    .proj-card:hover {
      border-color: rgba(255,255,255,.18);
      transform: translateY(-4px);
      box-shadow: 0 24px 48px rgba(0,0,0,.5);
    }
    .proj-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(41,151,255,.18), rgba(191,90,242,.18));
      border: 1px solid rgba(255,255,255,.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.375rem;
      line-height: 1;
    }
    .proj-name { font-weight: 600; font-size: 1.1875rem; letter-spacing: -.018em; }
    .proj-desc { color: var(--muted); font-size: .9375rem; line-height: 1.55; flex: 1; }
    .proj-tags { display: flex; flex-wrap: wrap; gap: .4rem; }
    .tag {
      font-size: .75rem;
      font-weight: 500;
      padding: .3rem .75rem;
      border-radius: 980px;
      color: var(--text2);
      background: rgba(255,255,255,.07);
      letter-spacing: -.006em;
    }
    .tag.green { color: var(--green); background: rgba(48,209,88,.12); }
    .tag.cyan  { color: var(--cyan);  background: rgba(100,210,255,.1); }
    .proj-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .8125rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: .9rem;
      margin-top: .25rem;
    }
    .proj-link { color: var(--accent); font-size: .875rem; }
    .proj-link:hover { text-decoration: underline; }

    /* ── ABOUT ── */
    .about-layout { display: grid; grid-template-columns: 1fr 340px; gap: 3rem; padding: 5rem 0; align-items: start; }
    @media (max-width: 700px) { .about-layout { grid-template-columns: 1fr; } }
    .about p { color: var(--text2); line-height: 1.65; letter-spacing: -.01em; margin-bottom: 1.1rem; }
    .about p strong { color: var(--text); font-weight: 600; }
    .about p a { color: var(--accent); }
    .about p a:hover { text-decoration: underline; }

    .about-card {
      background: linear-gradient(180deg, var(--surface), var(--surface2));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      overflow: hidden;
    }
    .about-card-header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      font-size: .9375rem;
      font-weight: 600;
      letter-spacing: -.01em;
      color: var(--text);
    }
    .about-card-body { padding: 1.25rem; }
    .info-row { display: flex; justify-content: space-between; gap: 1rem; padding: .6rem 0; border-bottom: 1px solid var(--border); font-size: .9375rem; }
    .info-row:last-child { border-bottom: none; }
    .info-key { color: var(--muted); }
    .info-val { color: var(--text); font-weight: 500; text-align: right; }
    .skill-list { display: flex; flex-wrap: wrap; gap: .45rem; margin-top: .75rem; }
    .now-list { font-size: .9375rem; color: var(--muted); line-height: 2; }
    .now-list span { color: var(--text); }

    /* ── CONTACT ── */
    .contact-layout { padding: 5rem 0; }
    .contact-layout h1 {
      font-size: clamp(2.25rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -.022em;
      margin-bottom: .75rem;
    }
    .contact-layout > p { color: var(--muted); font-size: 1.1875rem; letter-spacing: -.014em; margin-bottom: 2.5rem; max-width: 50ch; }

    .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.125rem; }
    .contact-card {
      background: linear-gradient(180deg, var(--surface), var(--surface2));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 1.375rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: border-color .3s var(--ease), transform .3s var(--ease), box-shadow .3s var(--ease);
      cursor: pointer;
    }
    .contact-card:hover {
      border-color: rgba(255,255,255,.18);
      transform: translateY(-3px);
      box-shadow: 0 18px 36px rgba(0,0,0,.45);
    }
    .contact-icon {
      width: 44px;
      height: 44px;
      border-radius: 11px;
      background: linear-gradient(135deg, rgba(41,151,255,.18), rgba(191,90,242,.18));
      border: 1px solid rgba(255,255,255,.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .contact-info-name { font-weight: 600; font-size: 1rem; letter-spacing: -.01em; }
    .contact-info-val { font-size: .8125rem; color: var(--muted); margin-top: .15rem; }

    .form-wrap {
      background: linear-gradient(180deg, var(--surface), var(--surface2));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 22px;
      padding: 2rem;
      margin-top: 2rem;
    }
    .form-wrap h2 { font-size: 1.375rem; font-weight: 600; letter-spacing: -.018em; margin-bottom: 1.5rem; }
    .field { margin-bottom: 1.125rem; }
    .field label { display: block; font-size: .875rem; font-weight: 500; color: var(--text2); margin-bottom: .45rem; }
    .field input, .field textarea {
      width: 100%;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 1.0625rem;
      letter-spacing: -.01em;
      padding: .75rem 1rem;
      outline: none;
      transition: border-color .2s var(--ease), box-shadow .2s var(--ease);
      resize: vertical;
    }
    .field input::placeholder, .field textarea::placeholder { color: var(--muted); }
    .field input:focus, .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(41,151,255,.2);
    }
    .field textarea { min-height: 120px; }
    .form-note { font-size: .8125rem; color: var(--muted); margin-top: 1.1rem; line-height: 1.6; }
    .form-note a { color: var(--accent); }
    .form-note a:hover { text-decoration: underline; }

    /* ── Footer ── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 1.75rem 0 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      font-size: .75rem;
      color: var(--muted);
    }
    .footer-right { display: flex; gap: 1.5rem; }
    .footer-right a { transition: color .2s var(--ease); }
    .footer-right a:hover { color: var(--text); text-decoration: underline; }

    /* ── Mobile nav toggle ── */
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      padding: .35rem .5rem;
      cursor: pointer;
      color: var(--text);
      font-family: inherit;
      font-size: 1.2rem;
      line-height: 1;
    }
    @media (max-width: 520px) {
      .nav-toggle { display: block; }
      .nav-links {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(22,22,23,.94);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        border-bottom: 1px solid rgba(255,255,255,.07);
        flex-direction: column;
        gap: 0;
        padding: .6rem 1rem 1rem;
      }
      .nav-links.open { display: flex; }
      .nav-links a {
        padding: .9rem .5rem;
        border-radius: 0;
        font-size: 1.0625rem;
        border-bottom: 1px solid rgba(255,255,255,.07);
      }
      .nav-links li:last-child a { border-bottom: none; }
      .nav-links a.active { background: none; }
      .btn-row { flex-direction: column; align-items: stretch; }
      .stats-row { gap: 2rem; }
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
      html { scroll-behavior: auto; }
    }
  </style>
</head>
<body>

<!-- ██ NAV ██ -->
<nav class="nav">
  <div class="shell nav-inner">
    <div class="brand" data-page="home">moa<span class="brand-dim">.exe</span></div>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">☰</button>
    <ul class="nav-links" id="nav-links" role="list">
      <li><a href="#" data-page="home">Home</a></li>
      <li><a href="#" data-page="experience">Experience</a></li>
      <li><a href="#" data-page="about">About</a></li>
      <li><a href="#" data-page="contact">Contact</a></li>
    </ul>
  </div>
</nav>

<!-- ██ PAGE MOUNT ██ -->
<div id="page"></div>

<!-- ██ FOOTER ██ -->
<footer class="footer shell">
  <span>© <span id="year"></span> · moa.exe</span>
  <div class="footer-right">
    <a href="https://github.com/moadotexe" target="_blank" rel="noopener">GitHub</a>
    <a href="#" data-page="contact">Contact</a>
    <a href="#" data-page="about">About</a>
  </div>
</footer>

<!-- ██ PAGE TEMPLATES ██ -->

      <div class="stat-item"><div class="stat-num">1+</div><div class="stat-label">Years exp.</div></div>

  <section class="bento">

        <span class="tag">GitHub</span>
      </div>
    </div>
  </section>
  <div class="spacer-lg"></div>
</div>

<template id="tpl-experience">
<div class="shell">
  <header class="projects-header">
    <p class="section-label">Work</p>
    <h1>Experience.</h1>
    <p>Professional roles where I've applied data science and research skills.</p>
  </header>

  <div class="proj-grid">

<script>
  // ── Router ──────────────────────────────────────
  const PAGES = ['home', 'experience', 'about', 'contact'];
  let current = 'home';

  function getPage() {
    const hash = location.hash.replace('#', '');
    return PAGES.includes(hash) ? hash : 'home';
  }

  function navigate(page, push = true) {
    if (page === current && document.getElementById('page').children.length) return;
    const el = document.getElementById('page');

    // exit animation
    el.classList.add('leaving');

    setTimeout(() => {
      // swap content
      const tpl = document.getElementById('tpl-' + page);
      el.innerHTML = '';
      el.appendChild(tpl.content.cloneNode(true));
      el.classList.remove('leaving');
      current = page;

      // update nav
      document.querySelectorAll('.nav-links a').forEach(a => {
        a.classList.toggle('active', a.dataset.page === page);
      });

      // update URL
      if (push) history.pushState({ page }, '', page === 'home' ? location.pathname : '#' + page);

      // scroll to top
      window.scrollTo({ top: 0 });

      // bind inner links
      bindLinks();
    }, 180);
  }

  function bindLinks() {
    document.querySelectorAll('[data-page]').forEach(el => {
      el.addEventListener('click', e => {
        const p = el.dataset.page;
        if (PAGES.includes(p)) { e.preventDefault(); navigate(p); }
      });
    });
  }

  // ── Init ────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('year').textContent = new Date().getFullYear();
    navigate(getPage(), false);

    // nav mobile toggle
    const toggle = document.getElementById('nav-toggle');
    const links  = document.getElementById('nav-links');
    toggle.addEventListener('click', () => links.classList.toggle('open'));
    links.addEventListener('click', () => links.classList.remove('open'));

    // nav data-page links
    bindLinks();
  });

  window.addEventListener('popstate', e => {
    navigate(e.state?.page || getPage(), false);
  });

  // ── Contact form stub ───────────────────────────
  function handleFormSubmit(e) {
    e.preventDefault();
    const btn = e.target;
    btn.textContent = 'Sent ✓';
    btn.style.color = 'var(--green)';
    btn.disabled = true;
  }
</script>
